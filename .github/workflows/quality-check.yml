name: quality-check

# 对 PR + 推到主干兜底。本地 pre-commit 可被 --no-verify 绕过，这里是强制墙。
# 策略：strict 模式拒绝任何 error 与 warning；
# F-002：从 5 个独立 step 简化为单一 runner step（来源：detailed-design.md §4.4）

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml ruamel.yaml

      - name: Run unified gate runner
        run: python scripts/gates/run.py --trigger=ci --strict
