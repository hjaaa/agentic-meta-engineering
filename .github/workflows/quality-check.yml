name: quality-check

# 对 PR + 推到主干兜底。本地 pre-commit 可被 --no-verify 绕过，这里是强制墙。
# 策略：strict 模式拒绝任何 error 与 warning；
# 新 warning 一出现立刻红 CI，避免 INDEX 腐化增量复发。
# 如需临时放行，应优先加 scripts/lib/index-config.yaml 的 ignore 白名单（需 PR review）而非关 strict。

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  schema-and-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check meta.yaml schema
        run: bash scripts/check-meta.sh --all --strict

      - name: Check INDEX.md integrity
        run: bash scripts/check-index.sh --strict

      - name: Check sourcing (刨根问底三态)
        run: bash scripts/check-sourcing.sh --all --strict
